<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Traveller Dashboard — Tripistry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="dash-wrap">
  <aside class="dash-side">
    <a href="index.html" class="logo">Trip<span style="color:var(--primary);">istry</span></a>
    <div class="user-info">TRAVELLER</div>
    <div class="user-name" id="sideName">---</div>
    <ul class="dash-nav">
      <li><a href="#" class="active" data-tab="packages">Packages</a></li>
      <li><a href="#" data-tab="bookings">My Bookings</a></li>
      <li><a href="#" data-tab="reviews">Reviews</a></li>
      <li><a href="#" data-tab="grouptrips">Group Trips</a></li>
      <li><a href="#" data-tab="destinations">Destinations</a></li>
      <li><a href="#" data-tab="flights">Flights</a></li>
      <li><a href="#" data-tab="accommodations">Accommodations</a></li>
      <li><a href="#" data-tab="attractions">Attractions</a></li>
      <li><a href="#" data-tab="restaurants">Restaurants</a></li>
      <a href="#" class="logout-link" onclick="logout()">Logout</a>
    </ul>
  </aside>

  <main class="dash-main" id="mainContent"></main>
</div>

<div id="toastContainer"></div>

<div class="modal-overlay" id="bookModal" style="display:none;">
  <div class="modal-box" style="background:white;border:3px solid var(--ink);box-shadow:var(--shadow);padding:40px;max-width:560px;width:90%;">
    <h2 style="font-family:'Outfit',sans-serif;text-transform:uppercase;margin-bottom:16px;">Confirm Booking</h2>
    <div id="modalPkgInfo"></div>
    <div style="margin-top:20px;font-size:13px;color:var(--muted);">
      <p>By confirming, you agree to book this package. The booking will appear in your dashboard.</p>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px;">
      <button class="btn btn-primary" id="confirmBookBtn" style="flex:1;">Yes, Book It</button>
      <button class="btn" onclick="closeBookModal()" style="flex:1;">Cancel</button>
    </div>
  </div>
</div>

function showDetailModal(title, content) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  overlay.innerHTML = '<div class="modal-box" style="background:white;border:3px solid var(--ink);box-shadow:var(--shadow);padding:32px;max-width:640px;width:90%;max-height:85vh;overflow-y:auto;">' +
    '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;">' +
    '<h2 style="font-family:\'Outfit\',sans-serif;text-transform:uppercase;">' + esc(title) + '</h2>' +
    '<button class="btn" style="padding:6px 10px;font-size:10px;" onclick="this.closest(\'.modal-overlay\').remove()">Close</button>' +
    '</div>' +
    content +
    '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
}

function imgUrl(pool, seed) { return IMG[pool][(seed || 1) % IMG[pool].length]; }

async function apiCall(url, options = {}) {
  const res = await fetch(API + url, { credentials: 'same-origin', ...options });
  if (res.status === 401) { window.location.href = 'login-traveller.html'; return null; }
  return { status: res.status, data: await res.json() };
}

function toast(msg, type = 'info') {/*
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);*/
}

function stars(n) {
  let s = ''; for (let i = 1; i <= 5; i++) s += i <= n ? '\u2605' : '\u2606'; return s;
}

function esc(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function init() {
  const r = await apiCall('session.php');
  if (!r || r.status !== 200) return;
  if (r.data.user_type !== 'traveller') { window.location.href = 'login-traveller.html'; return; }
  currentUser = r.data;
  document.getElementById('sideName').textContent = r.data.name || '---';
  loadTab('packages');
  document.getElementById('bookModal').addEventListener('click', function(e) {
    if (e.target === this) closeBookModal();
  });
}

document.querySelectorAll('.dash-nav a[data-tab]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.dash-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    loadTab(a.dataset.tab);
  });
});

async function loadTab(tab) {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading"><div class="pulse"></div> Loading...</div>';
  try {
    switch (tab) {
      case 'packages': await loadPackages(); break;
      case 'bookings': await loadBookings(); break;
      case 'reviews': await loadReviews(); break;
      case 'grouptrips': await loadGroupTrips(); break;
      case 'destinations': await loadDestinations(); break;
      case 'flights': await loadFlights(); break;
      case 'accommodations': await loadAccommodations(); break;
      case 'attractions': await loadAttractions(); break;
      case 'restaurants': await loadRestaurants(); break;
    }
  } catch (e) { main.innerHTML = '<div class="empty"><strong>Error</strong><p>' + e.message + '</p></div>'; }
}

// ---- PACKAGES ----
async function loadPackages() {
  const sort = document.getElementById('pkgSort')?.value || '';
  const min = document.getElementById('pkgMin')?.value || '';
  const max = document.getElementById('pkgMax')?.value || '';
  const dest = document.getElementById('pkgDest')?.value || '';
  const minRat = document.getElementById('pkgMinRating')?.value || '';
  const minDur = document.getElementById('pkgMinDur')?.value || '';
  const maxDur = document.getElementById('pkgMaxDur')?.value || '';
  const type = document.getElementById('pkgTypeFilter')?.value || '';

  const query = new URLSearchParams();
  if (sort) query.set('sort', sort);
  if (min) query.set('min_price', min);
  if (max) query.set('max_price', max);
  if (dest) query.set('destination_id', dest);
  if (minRat) query.set('min_rating', minRat);
  if (minDur) query.set('min_duration', minDur);
  if (maxDur) query.set('max_duration', maxDur);
  if (type) query.set('type', type);
  const qs = query.toString();

  const r = await apiCall('packages.php' + (qs ? '?' + qs : ''));
  const pkgs = r.data;
  let html = '<h2>Browse Packages</h2><div class="inline-form">';
  html += '<div class="field"><span>Sort</span><select id="pkgSort" onchange="loadPackages()"><option value="">Default</option><option value="price_asc">Price: Low to High</option><option value="price_desc">Price: High to Low</option><option value="rating">By Rating</option><option value="duration_asc">Duration: Short to Long</option><option value="duration_desc">Duration: Long to Short</option></select></div>';
  html += '<div class="field"><span>Type</span><select id="pkgTypeFilter" onchange="loadPackages()"><option value="">All</option><option value="Bundled">Bundled</option><option value="Individual">Individual</option></select></div>';
  html += '<div class="field"><span>Min Price</span><input type="number" id="pkgMin" placeholder="e.g. 5000" onchange="loadPackages()"></div>';
  html += '<div class="field"><span>Max Price</span><input type="number" id="pkgMax" placeholder="e.g. 30000" onchange="loadPackages()"></div>';
  html += '<div class="field"><span>Destination</span><select id="pkgDest" onchange="loadPackages()"><option value="">All Destinations</option></select></div>';
  html += '<div class="field"><span>Min Rating</span><input type="number" id="pkgMinRating" placeholder="1-5" min="1" max="5" step="0.1" onchange="loadPackages()"></div>';
  html += '<div class="field"><span>Min Days</span><input type="number" id="pkgMinDur" placeholder="Min duration" onchange="loadPackages()"></div>';
  html += '<div class="field"><span>Max Days</span><input type="number" id="pkgMaxDur" placeholder="Max duration" onchange="loadPackages()"></div>';
  html += '</div><div class="cards">';
  if (Array.isArray(pkgs)) {
    if (pkgs.length === 0) html += '<div class="empty"><strong>No packages found</strong></div>';
    pkgs.forEach(p => {
      const imgSrc = p.ImageURL || imgUrl('dest', p.PackageID);
      const pkgName = esc(p.Name) || 'Package #' + p.PackageID;
      html += `<div class="card card-rich">
        <div class="cr-thumb"><img src="${imgSrc}" alt="${pkgName}" loading="lazy" onerror="this.src='${imgUrl('dest', p.PackageID + 5)}'"><span class="img-tag">${esc(p.Type) || 'PACKAGE'}</span></div>
        <div class="cr-body">
          <div class="cr-meta"><span>${esc(p.AgencyName) || '---'}</span><span class="stars">${stars(Math.round(p.AgencyRating || 0))}</span></div>
          <h3>${pkgName}</h3>
          ${p.DurationDays ? '<p style="font-size:11px;color:var(--muted);">' + esc(String(p.DurationDays)) + ' days</p>' : ''}
          <div class="cr-footer">
            <div style="font-family:\'Outfit\',sans-serif;font-size:22px;font-weight:900;">R${Number(p.Price).toLocaleString()}</div>
            <div style="display:flex;gap:8px;">
              <button class="btn" style="padding:10px 14px;font-size:10px;" onclick="event.stopPropagation();window.location.href='package-details.html?id=${p.PackageID}'">View</button>
              <button class="btn btn-primary" style="padding:10px 16px;font-size:10px;" onclick="event.stopPropagation();showBookModal(${p.PackageID}, '${pkgName.replace(/'/g, "\\'")}', ${p.Price || 0}, '${esc(p.AgencyName || '')}')">Book Now</button>
            </div>
          </div>
        </div>
      </div>`;
    });
  }
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;

  (async function() {
    try {
      var destRes = await fetch(API + 'destinations.php').then(function(r) { return r.json(); });
      var destSel = document.getElementById('pkgDest');
      if (destSel && Array.isArray(destRes)) {
        destRes.forEach(function(d) {
          var opt = document.createElement('option');
          opt.value = d.DestinationID;
          opt.textContent = d.Name + ' (' + (d.Country || '') + ')';
          destSel.appendChild(opt);
        });
      }
    } catch(e) {}
  })();

  if (qs) {
    const params = new URLSearchParams(qs);
    const els = { pkgSort:'sort', pkgTypeFilter:'type', pkgMin:'min_price', pkgMax:'max_price', pkgMinRating:'min_rating', pkgMinDur:'min_duration', pkgMaxDur:'max_duration' };
    for (const [id, key] of Object.entries(els)) {
      const el = document.getElementById(id);
      if (el && params.get(key)) el.value = params.get(key);
    }
    if (params.get('destination_id')) {
      setTimeout(function() {
        var d = document.getElementById('pkgDest');
        if (d) d.value = params.get('destination_id');
      }, 500);
    }
  }
}

function showBookModal(id, name, price, agencyName) {
  document.getElementById('modalPkgInfo').innerHTML = `<div style="background:var(--bg);padding:20px;">
    <h3 style="font-family:'Outfit',sans-serif;">${esc(String(name))}</h3>
    <p style="margin-top:8px;">by ${esc(String(agencyName || '---'))}</p>
    <div style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;margin-top:12px;">R${Number(price).toLocaleString()}</div>
  </div>`;
  document.getElementById('bookModal').style.display = 'flex';
  document.getElementById('confirmBookBtn').onclick = function() { confirmBook(id); };
}
function closeBookModal() { document.getElementById('bookModal').style.display = 'none'; }
async function confirmBook(id) {
  const r = await apiCall('bookings.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ PackageID: id }) });
  if (r.status === 201) { closeBookModal(); toast('Booked successfully!', 'success'); loadBookings(); }
  else if (r.status === 409) toast('Already booked!', 'error');
  else toast(r.data.error || 'Failed', 'error');
}

// ---- BOOKINGS ----
async function loadBookings() {
  var r = await apiCall('bookings.php');
  var tripsR = await apiCall('grouptrips.php?enrolled_by=' + (currentUser ? currentUser.user_id : ''));
  var trips = (tripsR && Array.isArray(tripsR.data)) ? tripsR.data : [];
  var html = '<h2>My Bookings</h2>';
  var hasBookings = r && Array.isArray(r.data) && r.data.length > 0;
  var hasTrips = trips.length > 0;
  if (!hasBookings && !hasTrips) {
    html += '<div class="empty"><strong>No bookings yet</strong><p>Browse packages and book your first trip!</p></div>';
  } else {
    html += '<div class="cards">';
    if (hasBookings) r.data.forEach(function(b) {
      html += '<div class="card card-rich"><div class="cr-thumb"><img src="' + imgUrl('dest', b.PackageID) + '" alt="Booking" loading="lazy"><span class="img-tag success-tag">Booked</span></div><div class="cr-body"><h3>' + esc(b.Name || 'Package #' + b.PackageID) + '</h3><p style="font-size:12px;color:var(--muted);margin-top:4px;">' + esc(b.AgencyName || '---') + '</p><div class="cr-footer"><div style="font-family:\'Outfit\',sans-serif;font-size:20px;font-weight:900;">R' + Number(b.Price || 0).toLocaleString() + '</div><div style="display:flex;gap:6px;"><button class="btn" style="padding:8px 12px;font-size:9px;" onclick="reviewPackage(' + b.PackageID + ', \'' + esc(b.Name || '').replace(/'/g, "\\'") + '\')">Review</button><button class="btn btn-primary" style="padding:8px 12px;font-size:9px;" onclick="cancelBooking(' + b.PackageID + ')">Cancel</button></div></div></div></div>';
    });
    if (hasTrips) trips.forEach(function(t) {
      html += '<div class="card card-rich"><div class="cr-thumb"><img src="' + (t.ImageURL || imgUrl('trip', t.GroupTripID)) + '" alt="Trip" loading="lazy" onerror="this.src=\'' + imgUrl('trip', t.GroupTripID + 3) + '\'"><span class="img-tag success-tag">Enrolled</span></div><div class="cr-body"><h3>' + esc(t.Name || 'Trip #' + t.GroupTripID) + '</h3><p style="font-size:12px;color:var(--muted);margin-top:4px;">' + esc(t.AgencyName || '---') + '</p><p style="font-size:11px;">' + (t.StartDate || '?') + ' → ' + (t.EndDate || '?') + '</p><div class="cr-footer"><span class="badge badge-success" style="font-size:9px;">Enrolled</span><button class="btn btn-primary" style="padding:8px 12px;font-size:9px;" onclick="cancelEnrolment(' + t.GroupTripID + ')">Leave</button></div></div></div>';
    });
    html += '</div><div id="pkgReviewForm"></div>';
  }
  document.getElementById('mainContent').innerHTML = html;
}

async function cancelEnrolment(tripId) {
  if (!confirm('Leave this group trip?')) return;
  var r = await apiCall('grouptrips.php?id=' + tripId, { method: 'DELETE' });
  if (r.status === 200) { toast('Left group trip', 'success'); loadBookings(); loadGroupTrips(); }
  else toast(r.data.error || 'Failed', 'error');
}

function reviewPackage(pkgId, pkgName) {
  document.getElementById('pkgReviewForm').innerHTML = `
  <div style="background:white;border:2px solid var(--ink);padding:20px;margin-top:20px;box-shadow:var(--shadow);">
    <h3 style="font-family:'Outfit',sans-serif;text-transform:uppercase;margin-bottom:14px;">Review: ${esc(pkgName)}</h3>
    <div class="form-grid">
      <label class="field"><span>Rating (1-5)</span><input type="number" id="rvPkgRating" min="1" max="5" value="5"></label>
      <label class="field"><span>Feedback</span><textarea id="rvPkgFeedback" rows="3" placeholder="Share your experience..."></textarea></label>
    </div>
    <button class="btn btn-primary" onclick="submitPackageReview(${pkgId})" style="margin-top:10px;">Submit Review</button>
    <button class="btn" onclick="document.getElementById('pkgReviewForm').innerHTML=''" style="margin-top:10px;margin-left:8px;">Cancel</button>
  </div>`;
}

async function submitPackageReview(pkgId) {
  var body = { StarRating: parseInt(document.getElementById('rvPkgRating').value), Feedback: document.getElementById('rvPkgFeedback').value, PackageID: pkgId };
  var r = await apiCall('reviews.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (r.status === 201) { toast('Review submitted!', 'success'); document.getElementById('pkgReviewForm').innerHTML = ''; }
  else toast(r.data.error || 'Failed', 'error');
}

async function cancelBooking(packageId) {
  if (!confirm('Cancel booking for this package?')) return;
  var r = await apiCall('bookings.php?package_id=' + packageId, { method: 'DELETE' });
  if (r.status === 200) { toast('Booking cancelled', 'success'); loadBookings(); }
  else toast(r.data.error || 'Failed', 'error');
}

// ---- REVIEWS ----
var reviewLists = {};

async function loadReviewLists() {
  try {
    var results = await Promise.all([
      apiCall('packages.php'),
      apiCall('destinations.php'),
      apiCall('restaurants.php'),
      apiCall('accommodations.php')
    ]);
    reviewLists.package = (results[0] && Array.isArray(results[0].data)) ? results[0].data : [];
    reviewLists.destination = (results[1] && Array.isArray(results[1].data)) ? results[1].data : [];
    reviewLists.restaurant = (results[2] && Array.isArray(results[2].data)) ? results[2].data : [];
    reviewLists.accommodation = (results[3] && Array.isArray(results[3].data)) ? results[3].data : [];
  } catch(e) {}
}

function getItemName(type, id) {
  var list = reviewLists[type] || [];
  for (var i = 0; i < list.length; i++) {
    if (type === 'package' && list[i].PackageID == id) return list[i].Name || 'Package #' + id;
    if (type === 'destination' && list[i].DestinationID == id) return list[i].Name || 'Destination #' + id;
    if (type === 'restaurant' && list[i].RestaurantID == id) return list[i].Name || 'Restaurant #' + id;
    if (type === 'accommodation' && list[i].AccommodationID == id) return list[i].Location || 'Accommodation #' + id;
  }
  return type.charAt(0).toUpperCase() + type.slice(1) + ' #' + id;
}

function buildItemSelect(name, type, selectedId) {
  var list = reviewLists[type] || [];
  var h = '<select id="' + name + '" onchange="fetchBrowsedReviews()">';
  h += '<option value="">-- Select --</option>';
  list.forEach(function(item) {
    var id, label;
    if (type === 'package') { id = item.PackageID; label = item.Name || 'Package #' + id; }
    else if (type === 'destination') { id = item.DestinationID; label = item.Name || 'Destination #' + id; }
    else if (type === 'restaurant') { id = item.RestaurantID; label = item.Name || 'Restaurant #' + id; }
    else if (type === 'accommodation') { id = item.AccommodationID; label = item.Location || 'Accommodation #' + id; }
    h += '<option value="' + id + '"' + (id == selectedId ? ' selected' : '') + '>' + esc(label) + '</option>';
  });
  h += '</select>';
  return h;
}

function buildReviewFormItemSelect(name, type) {
  var list = reviewLists[type] || [];
  var h = '<select id="' + name + '">';
  h += '<option value="">-- Select --</option>';
  list.forEach(function(item) {
    var id, label;
    if (type === 'package') { id = item.PackageID; label = item.Name || 'Package #' + id; }
    else if (type === 'destination') { id = item.DestinationID; label = item.Name || 'Destination #' + id; }
    else if (type === 'restaurant') { id = item.RestaurantID; label = item.Name || 'Restaurant #' + id; }
    else if (type === 'accommodation') { id = item.AccommodationID; label = item.Location || 'Accommodation #' + id; }

  var overlay = document.createElement('div');

  overlay.style.display = 'flex';

    <h2 style="font-family:'Outfit',sans-serif;text-transform:uppercase;margin-bottom:16px;">Confirm Enrolment</h2>

    <p style="font-size:12px;color:var(--muted);margin-top:8px;">You will be registered as a participant and the enrolment will appear in your bookings.</p>

      <button class="btn btn-primary" id="confirmEnrolBtn" style="flex:1;">Yes, Enrol Me</button>
      <button class="btn" onclick="this.closest('.modal-overlay').remove()" style="flex:1;">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#confirmEnrolBtn').addEventListener('click', async function() {
    var r = await apiCall('grouptrips.php?action=enrol', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ GroupTripID: tripId }) });
    if (r.status === 200) { toast('Enrolled!', 'success'); overlay.remove(); loadGroupTrips(); loadBookings(); }

  });
}

      cardsHtml = '<div class="empty"><strong>No destinations in your packages</strong></div>';
    } else {
      var results = await Promise.all(bookedItems.map(function(id) { return apiCall('destinations.php?id=' + id); }));

        if (r && r.data && r.data.DestinationID) {

          cardsHtml += buildDestCard(d);

      });

      destDataCache[d.DestinationID] = d;
      cardsHtml += buildDestCard(d);

  document.querySelector('#mainContent .cards').innerHTML = cardsHtml;

function buildDestCard(d) {
  return '<div class="card card-rich clickable" onclick="showDestDetail(' + d.DestinationID + ')">' +
    '<div class="cr-thumb"><img src="' + imgUrl('dest', d.DestinationID) + '" alt="" loading="lazy" onerror="this.src=\'' + imgUrl('dest', d.DestinationID + 3) + '\'">' +

async function getBookedItemIds(dataKey, key, idField) {
  var bookedIds = await getBookedPackageIds();
  if (bookedIds.length === 0) return [];
  var results = await Promise.all(bookedIds.map(function(id) { return apiCall('packages.php?id=' + id); }));
  var ids = [];
  results.forEach(function(r) {
    if (r && r.data && r.data[key]) {
      r.data[key].forEach(function(item) { ids.push(item[idField]); });
    }
  });
  return [...new Set(ids)];
}

async function loadFlights() {
  const bookedIds = await getBookedPackageIds();
  let html = '<h2>Flights</h2>';
  if (bookedIds.length === 0) {
    html += '<div class="empty"><strong>No bookings yet</strong><p>Book a package first to see your flights here.</p></div>';
    document.getElementById('mainContent').innerHTML = html;
    return;
  }
  const results = await Promise.all(bookedIds.map(function(id) { return apiCall('packages.php?id=' + id); }));
  const seen = {};
  const flights = [];
  results.forEach(function(r) {
    if (r && r.data && r.data.flights) {
      r.data.flights.forEach(function(f) {
        if (!seen[f.FlightID]) { seen[f.FlightID] = true; flights.push(f); }
      });
    }
  });
  html += '<div class="tbl-wrap"><table class="tbl"><tr><th>ID</th><th>From</th><th>To</th><th>Departure</th><th>Arrival</th><th>Fare</th><th>Airline</th></tr>';
  if (flights.length === 0) html += '<tr><td colspan="7">No flights in your packages</td></tr>';
  else flights.forEach(function(f) {
    html += '<tr><td>' + f.FlightID + '</td><td>' + esc(f.Origin) + '</td><td>' + esc(f.Destination) + '</td><td>' + esc(f.DepartureTime) + '</td><td>' + esc(f.ArrivalTime) + '</td><td>R' + Number(f.Fare).toLocaleString() + '</td><td>' + esc(f.AirlineName || '---') + '</td></tr>';
  });
  html += '</table></div>';
  document.getElementById('mainContent').innerHTML = html;
}

async function getBookedPackageIds() {
  try {
    var r = await apiCall('bookings.php');
    if (r && Array.isArray(r.data)) return r.data.map(function(b) { return b.PackageID; }).filter(function(id) { return id; });
  } catch(e) {}
  return [];
}

async function getBookedItems(key) {
  var bookedIds = await getBookedPackageIds();
  if (bookedIds.length === 0) return [];
  var results = await Promise.all(bookedIds.map(function(id) { return apiCall('packages.php?id=' + id); }));
  var seen = {};
  var items = [];
  results.forEach(function(r) {
    if (r && r.data && r.data[key]) {
      r.data[key].forEach(function(item) {
        var itemId = item[key === 'accommodations' ? 'AccommodationID' : key === 'attractions' ? 'AttractionID' : 'RestaurantID'];
        if (!seen[itemId]) { seen[itemId] = true; items.push(item); }
      });
    }
  });
  return items;
}

    var r = await apiCall('attractions.php?id=' + id);
    if (!r || r.status !== 200) return;
    var a = r.data;
    var detail = '<strong>Type:</strong> ' + esc(a.Type || 'N/A') + '<br><strong>Location:</strong> ' + esc(a.Location || 'N/A') + '<br><strong>Price:</strong> R' + Number(a.Price || 0).toLocaleString();
    var modalBox = document.querySelector('.modal-overlay .modal-box');
    if (modalBox) modalBox.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;"><h2 style="font-family:\'Outfit\',sans-serif;text-transform:uppercase;">' + esc(title) + '</h2><button class="btn" style="padding:6px 10px;font-size:10px;" onclick="this.closest(\'.modal-overlay\').remove()">Close</button></div><div style="font-size:14px;line-height:2;">' + detail + '</div>';
  } catch(e) {}
}

async function showRestDetail(id, title) {
  showDetailModal(title, '<div style="text-align:center;padding:20px;">Loading...</div>');
  try {
    var r = await apiCall('restaurants.php?id=' + id);
    if (!r || r.status !== 200) return;
    var a = r.data;
    var detail = '<strong>Price Range:</strong> ' + esc(a.PriceRange || 'N/A') + '<br><strong>Cuisine:</strong> ' + esc(a.CuisineTypes || 'Various') + '<br><strong>Location:</strong> ' + esc(a.Locations || 'N/A');
    var modalBox = document.querySelector('.modal-overlay .modal-box');
    if (modalBox) modalBox.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;"><h2 style="font-family:\'Outfit\',sans-serif;text-transform:uppercase;">' + esc(title) + '</h2><button class="btn" style="padding:6px 10px;font-size:10px;" onclick="this.closest(\'.modal-overlay\').remove()">Close</button></div><div style="font-size:14px;line-height:2;">' + detail + '</div>';
  } catch(e) {}
}

async function logout() {
  await apiCall('logout.php');
  window.location.href = 'login-traveller.html';
}

init();
